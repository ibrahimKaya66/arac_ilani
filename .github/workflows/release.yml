name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Restore .NET
        run: dotnet restore
        working-directory: src

      - name: Build .NET
        run: dotnet build --no-restore -c Release
        working-directory: src

      - name: Publish API
        run: dotnet publish src/AracIlan.Api/AracIlan.Api.csproj -c Release -o publish/api
        continue-on-error: true

      - name: Install web deps
        run: npm ci
        working-directory: web

      - name: Build web
        run: npm run build
        working-directory: web
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:5094' }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
